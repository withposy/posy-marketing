<footer class="site-footer">
  <div class="footer-inner">
    <a href="{{ "" | relLangURL }}" class="footer-logo" aria-label="Posy home">
      <img src="{{ "posy-mark.svg" | relURL }}" alt="" class="logomark-icon" width="40" height="40" loading="lazy">
      <span class="logo-wordmark">Posy</span>
    </a>
    <div class="footer-links">
      {{ range .Site.Menus.footer }}
        <a href="{{ .URL | absLangURL }}">{{ .Name }}</a>
      {{ end }}
    </div>
    <div class="footer-social">
      <a href="{{ .Site.Params.instagramURL }}" target="_blank" rel="noopener" aria-label="Instagram">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      </a>
      <a href="{{ .Site.Params.tiktokURL }}" target="_blank" rel="noopener" aria-label="TikTok">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 0 0-.79-.05A6.34 6.34 0 0 0 3.15 15a6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.34-6.34V8.77a8.18 8.18 0 0 0 4.76 1.52v-3.4a4.85 4.85 0 0 1-1-.2z"/></svg>
      </a>
      <div class="footer-lang-dropdown">
        <button class="footer-lang-btn" id="footerLangBtn" aria-expanded="false" aria-haspopup="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          <span>{{ .Site.Language.LanguageName }}</span>
          <svg class="footer-lang-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="footer-lang-menu" id="footerLangMenu">
          {{ range .Site.Languages }}
          <a href="/{{ if ne .Lang "en" }}{{ .Lang }}/{{ end }}" class="footer-lang-option{{ if eq $.Site.Language.Lang .Lang }} active{{ end }}">
            <span class="lang-flag">{{ .Params.languageFlag }}</span>
            <span>{{ .LanguageName }}</span>
          </a>
          {{ end }}
        </div>
      </div>
    </div>
  </div>
</footer>
