{{ define "main" }}
<article class="page-single">

<!-- Contact Info -->
<section class="section bg-white">
  <div class="container">
    <div class="contact-header reveal">
      <h1 class="section-title">{{ i18n "contact_title" }}</h1>
      <p class="contact-intro">{{ i18n "contact_intro" }} {{ printf (i18n "contact_faq_hint") ("pricing/#faq" | relLangURL) | safeHTML }}</p>
    </div>
    <div class="contact-methods reveal">
      <div class="contact-method">
        <div class="contact-method-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </div>
        <h3>Email</h3>
        <p><a href="mailto:hello@withposy.com">hello@withposy.com</a></p>
      </div>
      <div class="contact-method">
        <div class="contact-method-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        </div>
        <h3>Instagram</h3>
        <p><a href="https://www.instagram.com/posy_photos" target="_blank" rel="noopener">@posy_photos</a></p>
      </div>
      <div class="contact-method">
        <div class="contact-method-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>
        </div>
        <h3>TikTok</h3>
        <p><a href="https://www.tiktok.com/@the.bride.club" target="_blank" rel="noopener">@the.bride.club</a></p>
      </div>
    </div>
  </div>
</section>

<!-- CTA -->
<section class="section contact-cta">
  <div class="container text-center">
    <h2 class="section-title reveal">{{ i18n "contact_cta_title" }}</h2>
    <a href="{{ "pricing/" | relLangURL }}" class="btn btn-outline reveal">{{ i18n "sign_up" }}</a>
  </div>
</section>

</article>
{{ end }}
