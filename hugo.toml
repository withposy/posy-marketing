baseURL = 'https://eventsnap.it/'
title = 'Posy'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  description = 'Hold everything close.'
  appURL = 'https://app.eventsnap.it'
  instagramURL = 'https://www.instagram.com/posy_photos'
  tiktokURL = 'https://www.tiktok.com/@the.bride.club'

